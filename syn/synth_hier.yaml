#
# Hierarchical synthesis config — bottom-up: sub-modules first, then top.
# Each module gets its own recipe sweep; winner netlists feed the parent.

rtl_files:
  - rtl/psram_csr.v
  - rtl/psram_cache.v
  - rtl/psram_ctrl.v
  - rtl/ahb_slave_if.v
  - rtl/ms_psram_ahb.v

lib_typ: synth_flow/sky130/hd_124_ss.lib
lib_fast: /Users/mshalan/work/pdks/volare/ciel/sky130/versions/8afc8346a57fe1ab7934ba5a6056ea8b43078e71/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__ff_n40C_1v95.lib
lib_slow: /Users/mshalan/work/pdks/volare/ciel/sky130/versions/8afc8346a57fe1ab7934ba5a6056ea8b43078e71/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__ss_100C_1v60.lib

cell_blackbox: /Users/mshalan/work/pdks/volare/ciel/sky130/versions/8afc8346a57fe1ab7934ba5a6056ea8b43078e71/sky130A/libs.ref/sky130_fd_sc_hd/verilog/sky130_fd_sc_hd__blackbox.v

top: ms_psram_ahb

period_ps: 8000
clock_port: hclk
objective: pareto

modules:
  - ahb_slave_if
  - psram_csr
  - psram_cache
  - psram_ctrl
  - ms_psram_ahb

params:
  ahb_slave_if:
    ADDR_WIDTH: 23
  psram_csr:
    SPI_CMD_READ: "8'h0B"
    SPI_CMD_WRITE: "8'h02"
    SPI_DMY_CLKS: "6'd8"
    QUAD_CMD_READ: "8'hEB"
    QUAD_CMD_WRITE: "8'h38"
    QUAD_DMY_CLKS: "6'd6"
    QUAD_ENTER_CMD: "8'h35"
    QUAD_ADDR_CLKS: "6'd6"
  psram_cache:
    ADDR_WIDTH: 23
    INDEX_BITS: 4
    BUF_DEPTH: 4
  psram_ctrl:
    SPI_CLK_DIV: 2
    QUAD_EN: 1
    ADDR_WIDTH: 23
    INIT_DLY: "16'd5000"
    RST_DLY: "16'd2500"
    SPI_ADDR_BITS: 24
    SPI_DMY_CLKS: 8
    SPI_CMD_READ: "8'h0B"
    SPI_CMD_WRITE: "8'h02"
    QUAD_CMD_READ: "8'hEB"
    QUAD_CMD_WRITE: "8'h38"
    QUAD_DMY_CLKS: "6'd6"
    QUAD_ENTER_CMD: "8'h35"
    QUAD_ADDR_CLKS: "6'd6"
  ms_psram_ahb:
    SPI_CLK_DIV: 2
    QUAD_EN: 1
    ADDR_WIDTH: 23
    INIT_DLY: "16'd5000"
    RST_DLY: "16'd2500"
    CACHE_EN: 1
    CACHE_INDEX_BITS: 4

driving_cell: sky130_fd_sc_hd__inv_1
load_ff: 33.0

run_sta: true
run_gls: false

yosys: yosys
opensta: /nix/store/2ia51h09wfm9qpm9dg3zq52cr578ah61-opensta/bin/sta
iverilog: iverilog
vvp: vvp
